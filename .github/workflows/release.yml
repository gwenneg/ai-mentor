# Thin caller — the release logic lives in claude-ichiba's reusable
# plugin-release workflow (annotated-tag validation, GitHub release,
# marketplace dispatch). Pinned to a commit SHA, never @main.
name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    uses: gwenneg/claude-ichiba/.github/workflows/plugin-release.yml@2cd3f7fbe4fe0a80ff28215c513042cc83f08b1f # 2026-07-04
    permissions:
      contents: write
    secrets:
      ICHIBA_PAT: ${{ secrets.ICHIBA_PAT }}
