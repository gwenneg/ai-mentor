# Thin caller — the release logic lives in claude-ichiba's reusable
# plugin-release workflow (version computed from the latest v* tag, signed
# plugin.json bump commit, annotated tag, GitHub release, marketplace
# dispatch). Pinned to a commit SHA, never @main.
name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Semver component to bump (auto derives it from conventional commits)
        type: choice
        options: [auto, patch, minor, major]
        default: auto

jobs:
  release:
    uses: gwenneg/claude-ichiba/.github/workflows/plugin-release.yml@7cbab7b54712e1606470ec853e0a95489107c789 # 2026-07-06
    with:
      bump: ${{ inputs.bump }}
    permissions:
      contents: write
      pull-requests: write # the version bump lands through an auto-merged PR
    secrets:
      ICHIBA_PAT: ${{ secrets.ICHIBA_PAT }}
