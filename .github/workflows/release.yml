name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:

      - id: tag
        name: Validate and extract tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          # Only annotated tags are supported — lightweight tags provide no signing guarantee.
          TYPE=$(gh api "repos/$GITHUB_REPOSITORY/git/ref/tags/$TAG" --jq '.object.type')
          if [ "$TYPE" != "tag" ]; then
            echo "Error: $TAG is not an annotated tag (type='$TYPE')"
            exit 1
          fi
          echo "value=$TAG" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.ref }}

      - name: Version consistency guard
        env:
          TAG: ${{ steps.tag.outputs.value }}
        run: |
          # If plugin.json declares a version, it must match the tag being
          # released — the marketplace serves the tree at this commit, so a
          # mismatch would ship a lying manifest. Inert while the version
          # field is absent (adopting it is opt-in via prepare-release.yml).
          MANIFEST_VERSION=$(python3 -c "import json; print(json.load(open('.claude-plugin/plugin.json')).get('version', ''))")
          TAG_VERSION="${TAG#v}"
          if [ -n "$MANIFEST_VERSION" ] && [ "$MANIFEST_VERSION" != "$TAG_VERSION" ]; then
            echo "Error: plugin.json version ($MANIFEST_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi

      - id: create-release
        name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.value }}
        run: |
          URL=$(gh release create "$TAG" --repo "$GITHUB_REPOSITORY" --title "$TAG" --generate-notes)
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Dispatch to claude-ichiba
        env:
          ICHIBA_PAT: ${{ secrets.ICHIBA_PAT }}
          RELEASE: ${{ steps.create-release.outputs.url }}
        run: |
          # Dispatch the full release URL — claude-ichiba resolves the plugin name, tag, and SHA from it.
          curl -fsSL -X POST \
            -H "Authorization: token $ICHIBA_PAT" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/gwenneg/claude-ichiba/dispatches" \
            -d "$(jq -n --arg release "$RELEASE" '{event_type: "plugin-release", client_payload: {release: $release}}')"
