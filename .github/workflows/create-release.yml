name: Create Release

on:
  push:
    tags: ['v*']

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - id: tag
        name: Extract tag
        run: echo "value=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Validate annotated tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.value }}
        run: |
          # Only annotated tags are supported — lightweight tags provide no signing guarantee.
          # Retry to handle the brief lag between tag push and GitHub REST API indexing.
          set +e
          for i in 1 2 3; do
            TYPE=$(gh api "repos/$GITHUB_REPOSITORY/git/ref/tags/$TAG" --jq '.object.type')
            EC=$?
            [ $EC -eq 0 ] && break
            echo "Attempt $i failed (exit $EC, type='$TYPE')"
            [ $i -lt 3 ] && sleep 5
          done
          set -e
          [ "$TYPE" != "tag" ] && echo "Error: $TAG is not an annotated tag" && exit 1

      - id: release
        name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.value }}
        run: |
          URL=$(gh release create "$TAG" --title "$TAG" --generate-notes)
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Dispatch to claude-ichiba
        env:
          ICHIBA_PAT: ${{ secrets.ICHIBA_PAT }}
          RELEASE: ${{ steps.release.outputs.url }}
        run: |
          # Dispatch the full release URL — claude-ichiba resolves the plugin name, tag, and SHA from it.
          curl -fsSL -X POST \
            -H "Authorization: token $ICHIBA_PAT" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/gwenneg/claude-ichiba/dispatches" \
            -d "$(jq -n --arg release "$RELEASE" '{event_type: "plugin-release", client_payload: {release: $release}}')"
