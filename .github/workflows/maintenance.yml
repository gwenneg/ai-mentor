# Scheduled content maintenance: a headless Claude session runs the
# /ai-mentor-update skill in --auto mode and opens a PR for human review.
#
# Requirements before the first run:
#   - Repository secret ANTHROPIC_API_KEY
#   - Supervise the first run (workflow_dispatch) before trusting the schedule.
#
# Notes:
#   - /ai-mentor-update has disable-model-invocation: true; an explicit
#     invocation in the -p prompt is a user invocation and is expected to
#     work. Confirm on the first run.
#   - The skill's auto mode never touches git; this workflow owns branching,
#     committing, and the PR. The skill's final output becomes the PR body.
#   - Scheduled runs are gated on deterministic work detection (catalog drift
#     or an unprocessed what's-new digest) so no-op weeks cost nothing.
#     Manual dispatch always runs — it can select steps the gate doesn't model.

name: Scheduled maintenance

on:
  schedule:
    - cron: '0 6 * * 1'   # Mondays 06:00 UTC
  workflow_dispatch:
    inputs:
      steps:
        # Deliberately NOT the scheduled routine (4,5): manual dispatch defaults
        # to the deep re-verification (3) that scheduled runs never perform.
        description: 'Steps to run (2=audit, 3=verify, 4=tool changes, 5=catalog sync)'
        default: '3,5'
      files:
        description: 'How many oldest-verified files to verify in step 3'
        default: '5'

permissions:
  contents: write
  pull-requests: write

jobs:
  maintain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: tools/catalog-drift/go.mod
          cache: false

      # Scheduled runs gate the paid work on deterministic checks: catalog drift
      # (catalog-drift exit 1) or an unprocessed what's-new digest. A fetch/setup
      # error (exit >= 2, or an empty index) fails the job visibly instead of
      # silently skipping the week. Manual dispatch bypasses the gate entirely.
      - name: Check for work (deterministic, no LLM)
        id: gate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual dispatch — running the selected steps regardless of the gate."
            echo "work=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # An open maintenance PR means last week's rows aren't on main yet;
          # re-running would re-detect the same work and stack a duplicate PR.
          if [ "$(gh pr list --state open --label maintenance --json number --jq 'length' || echo 0)" -gt 0 ]; then
            echo "An open maintenance PR already exists — skipping until it merges."
            echo "work=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          drift=0
          # No pipe: a pipe under the default shell reports tee's exit (0) and
          # hides the drift tool's real exit code.
          go -C tools/catalog-drift run . > catalog-drift.txt 2>&1 || drift=$?
          cat catalog-drift.txt
          if [ "$drift" -ge 2 ]; then exit "$drift"; fi
          # -L so a docs redirect doesn't return a bodyless 3xx that reads as "no work".
          curl -fsSL https://code.claude.com/docs/en/whats-new/index.md -o /tmp/whats-new-index.md
          index_slugs=$(grep -oE '20[0-9]{2}-w[0-9]+' /tmp/whats-new-index.md | sort -u)
          if [ -z "$index_slugs" ]; then
            echo "what's-new index yielded no week slugs — format change or bad fetch." >&2
            exit 2
          fi
          new_digests=$(comm -23 \
            <(printf '%s\n' "$index_slugs") \
            <(grep -oE '20[0-9]{2}-w[0-9]+' skills/mentor/processed-changelogs.md | sort -u))
          if [ "$drift" -eq 1 ] || [ -n "$new_digests" ]; then
            echo "Work found — catalog drift: $([ "$drift" -eq 1 ] && echo yes || echo no); new digests: $(tr '\n' ' ' <<< "$new_digests")"
            echo "work=true" >> "$GITHUB_OUTPUT"
          else
            echo "No catalog drift and no unprocessed digests — skipping the paid maintenance run."
            echo "work=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        if: github.event_name == 'workflow_dispatch' || steps.gate.outputs.work == 'true'
        with:
          node-version: '24'

      - name: Install Claude Code CLI
        if: github.event_name == 'workflow_dispatch' || steps.gate.outputs.work == 'true'
        run: npm install -g @anthropic-ai/claude-code

      - name: Run maintenance skill (headless, non-interactive)
        if: github.event_name == 'workflow_dispatch' || steps.gate.outputs.work == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          STEPS: ${{ github.event.inputs.steps || '4,5' }}
          FILES: ${{ github.event.inputs.files || '5' }}
        run: |
          set -o pipefail
          claude -p "/ai-mentor-update --auto $STEPS --files $FILES" \
            --model claude-sonnet-5 \
            --allowedTools "WebSearch" "WebFetch" "Read" "Edit" "Write" "Glob" "Grep" \
              "Bash(date *)" "Bash(python3 *)" "Bash(git diff *)" "Bash(git status *)" \
              "Bash(curl -s https://code.claude.com/*)" "Bash(curl -s https://raw.githubusercontent.com/anthropics/*)" \
              "Bash(go -C tools/catalog-lint run .)" \
            --max-turns 150 \
            | tee maintenance-report.md

      - name: Catalog lint (gates the PR — GITHUB_TOKEN PRs don't trigger CI)
        if: github.event_name == 'workflow_dispatch' || steps.gate.outputs.work == 'true'
        run: go -C tools/catalog-lint run .

      - name: Open PR if anything changed
        if: github.event_name == 'workflow_dispatch' || steps.gate.outputs.work == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "ai-mentor-maintenance[bot]"
          git config user.email "noreply@users.noreply.github.com"
          rm -f catalog-drift.txt
          if [ -z "$(git status --porcelain | grep -v 'maintenance-report.md')" ]; then
            echo "No changes — nothing to PR."
            exit 0
          fi
          BRANCH="maintenance/$(date -u +%Y-%m-%d)-${{ github.run_id }}"
          git checkout -b "$BRANCH"
          git add skills/ .claude/skills/
          git rm --cached -f maintenance-report.md 2>/dev/null || true
          git commit -m "chore: scheduled content maintenance ($(date -u +%Y-%m-%d))"
          git push -u origin "$BRANCH"
          gh pr create \
            --title "Scheduled maintenance: $(date -u +%Y-%m-%d)" \
            --body-file maintenance-report.md \
            --label maintenance || gh pr create \
            --title "Scheduled maintenance: $(date -u +%Y-%m-%d)" \
            --body-file maintenance-report.md
