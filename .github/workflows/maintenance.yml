# Scheduled content maintenance: a headless Claude session runs the
# /ai-mentor-update skill in --auto mode and opens a PR for human review.
#
# Requirements before the first run:
#   - Repository secret ANTHROPIC_API_KEY
#   - Supervise the first run (workflow_dispatch) before trusting the schedule.
#
# Notes:
#   - /ai-mentor-update has disable-model-invocation: true; an explicit
#     invocation in the -p prompt is a user invocation and is expected to
#     work. Confirm on the first run.
#   - The skill's auto mode never touches git; this workflow owns branching,
#     committing, and the PR. The skill's final output becomes the PR body.

name: Scheduled maintenance

on:
  schedule:
    - cron: '0 6 * * 1'   # Mondays 06:00 UTC
  workflow_dispatch:
    inputs:
      steps:
        description: 'Steps to run (2=audit, 3=verify, 4=tool changes, 5=catalog sync)'
        default: '3,5'
      files:
        description: 'How many oldest-verified files to verify in step 3'
        default: '5'

permissions:
  contents: write
  pull-requests: write

jobs:
  maintain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Plugin catalog drift check (plain script)
        id: catalog
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/check_plugin_catalog.sh | tee catalog-drift.txt

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Run maintenance skill (headless, non-interactive)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          STEPS: ${{ github.event.inputs.steps || '4,5' }}
          FILES: ${{ github.event.inputs.files || '5' }}
        run: |
          claude -p "/ai-mentor-update --auto $STEPS --files $FILES" \
            --allowedTools "WebSearch" "WebFetch" "Read" "Edit" "Write" "Glob" "Grep" \
              "Bash(gh api *)" "Bash(date *)" "Bash(python3 *)" "Bash(git diff *)" "Bash(git status *)" \
              "Bash(curl -s https://code.claude.com/*)" "Bash(go -C scripts/audit run .)" \
            --max-turns 150 \
            | tee maintenance-report.md

      - name: Open PR if anything changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "ai-mentor-maintenance[bot]"
          git config user.email "noreply@users.noreply.github.com"
          rm -f catalog-drift.txt
          if [ -z "$(git status --porcelain | grep -v 'maintenance-report.md')" ]; then
            echo "No changes — nothing to PR."
            exit 0
          fi
          BRANCH="maintenance/$(date -u +%Y-%m-%d)"
          git checkout -b "$BRANCH"
          git add -A
          git rm --cached -f maintenance-report.md 2>/dev/null || true
          git commit -m "chore: scheduled content maintenance ($(date -u +%Y-%m-%d))"
          git push -u origin "$BRANCH"
          gh pr create \
            --title "Scheduled maintenance: $(date -u +%Y-%m-%d)" \
            --body-file maintenance-report.md \
            --label maintenance || gh pr create \
            --title "Scheduled maintenance: $(date -u +%Y-%m-%d)" \
            --body-file maintenance-report.md
