# Behavioral evals for the mentor skill (Groups A-C from evals/cases.md),
# run headless via tools/eval-runner against the committed fixture project.
#
# Triggers:
#   - The standing release PR (release/next): matches the documented cadence
#     "run Groups A-C before every release tag". The branch is force-refreshed
#     on every push to main, so concurrency cancels superseded runs — only the
#     state you'd actually tag gets a full run.
#   - Targeted PR runs: a feature PR whose body carries a line-anchored
#     "Evals: <case ids | smoke>" marker (optional "Eval-Epochs: N", default 6)
#     runs exactly those cases, gated and pass^k — a PR that claims to fix a
#     case must show that case passing every epoch BEFORE merge. PRs without
#     the marker keep the skipped-run behavior that satisfies the ruleset.
#     Side effects: declare "Evals: smoke" (or add cases) when the change
#     could ripple; the full 3-epoch suite still gates at release/next.
#   - Manual dispatch for feature branches (pick groups/cases; gate=false
#     for a report-only run).
#
# GATING: any FAIL or ERROR fails the job. What gates are the deterministic
# expectations in evals/cases.md — classification, fabrication, grounding,
# output shape, never-repeat, profile hygiene — objective criteria the judge
# scores mechanically. If a fuzzy quality rubric is ever added, it must stay
# advisory: it informs, never blocks. The report lands
# in the job summary and as a PR comment either way.
#
# Group D (trigger calibration) is interactive-only and never runs here.

name: Evals

on:
  pull_request:
    # "edited" so adding the Evals: marker to an existing PR body starts a run.
    types: [opened, synchronize, reopened, edited]
    branches: [main]
  workflow_dispatch:
    inputs:
      groups:
        description: 'Groups to run, comma-separated. A = problem mode (classification + output shape), B = growth mode, C = never-repeat. (D = trigger calibration is interactive-only, never runs here)'
        default: 'A,B,C'
      cases:
        description: 'Optional case filter (e.g. A01,A19,B03)'
        default: ''
      smoke:
        description: 'Run the curated smoke tier (ignores the cases filter)'
        type: boolean
        default: false
      epochs:
        description: 'Independent runs per case (N>1 gates on a strict majority and flags flaky cases)'
        default: '1'
      gate:
        description: 'Fail the job on eval failures'
        type: boolean
        default: true
      jobs:
        description: 'Concurrent cases (-j). Subscription limits are a usage pool, not a concurrency cap — parallelism only compresses wall clock. Lower if ERROR results survive the retry pass.'
        default: '9'

concurrency:
  group: evals-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  evals:
    if: github.event_name == 'workflow_dispatch' || github.head_ref == 'release/next' || contains(github.event.pull_request.body, 'Evals:')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: tools/eval-runner/go.mod
          cache: false

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Run eval suite
        env:
          # Auth: either secret works (the runner and the claude CLI honor
          # both). When both are set, the OAuth token wins — enforced below so
          # a stale or out-of-credit ANTHROPIC_API_KEY secret can never shadow
          # a freshly added subscription token. Subscription runs draw from
          # the account's shared usage pool: keep -j at its modest default.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GROUPS: ${{ github.event.inputs.groups || 'A,B,C' }}
          CASES: ${{ github.event.inputs.cases || '' }}
          SMOKE: ${{ github.event.inputs.smoke || 'false' }}
          # Release-PR runs (no dispatch inputs) gate at 3 epochs: strict
          # majority per case — pass^k for [strict] invariants, where one
          # failed epoch IS the verdict — so ordinary flakes can't block or
          # fake a verdict. Dispatch runs keep their chosen epochs (default 1).
          EPOCHS: ${{ github.event.inputs.epochs || '3' }}
          JOBS: ${{ github.event.inputs.jobs || '9' }}
          GATE: ${{ github.event.inputs.gate || 'true' }}
          PR_BODY: ${{ github.event_name == 'pull_request' && github.event.pull_request.body || '' }}
          HEAD_REF: ${{ github.head_ref }}
        run: |
          if [ -n "$CLAUDE_CODE_OAUTH_TOKEN" ]; then unset ANTHROPIC_API_KEY; fi
          ARGS="-j $JOBS -out $GITHUB_WORKSPACE/eval-report.md -records $GITHUB_WORKSPACE/eval-records.jsonl"
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ] && [ "$HEAD_REF" != "release/next" ]; then
            # Targeted PR run: the body's "Evals:" line names the cases this
            # change must pass. Always gated and pass^k — a fix PR's target
            # passing 4 of 6 epochs is not a demonstrated fix.
            TARGETS=$(printf '%s\n' "$PR_BODY" | tr -d '\r' | sed -n 's/^Evals:[[:space:]]*//p' | head -1)
            if [ -z "$TARGETS" ]; then
              echo "No line-anchored 'Evals:' marker in the PR body — nothing to run." >> "$GITHUB_STEP_SUMMARY"
              exit 0
            fi
            EP=$(printf '%s\n' "$PR_BODY" | tr -d '\r' | sed -n 's/^Eval-Epochs:[[:space:]]*//p' | head -1)
            ARGS="$ARGS -epochs ${EP:-6} -gate -passk"
            if [ "$TARGETS" = "smoke" ]; then
              ARGS="$ARGS -smoke"
            else
              ARGS="$ARGS -cases $(echo $TARGETS | tr ' ' ',')"
            fi
          else
            ARGS="$ARGS -epochs $EPOCHS"
            if [ "$SMOKE" = "true" ]; then
              ARGS="$ARGS -smoke"
            else
              ARGS="$ARGS -groups $GROUPS"
              if [ -n "$CASES" ]; then ARGS="$ARGS -cases $CASES"; fi
            fi
            if [ "$GATE" = "true" ]; then ARGS="$ARGS -gate"; fi
          fi
          go -C tools/eval-runner run . $ARGS
        working-directory: ${{ github.workspace }}

      # Per-epoch verdict records: the raw material for judge calibration
      # (read a sample, agree/disagree) and per-case flake history. 14-day
      # retention — calibration reviews happen within days of a run.
      - name: Upload verdict records
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: eval-records
          path: eval-records.jsonl
          retention-days: 14
          # warn, not ignore: -records is always passed above, so a missing
          # file is always a failure — ignore would hide it on a green run.
          if-no-files-found: warn

      - name: Publish report
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ ! -f eval-report.md ]; then
            echo "No eval report produced — the runner failed before writing one." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          cat eval-report.md >> "$GITHUB_STEP_SUMMARY"
          if [ -n "${{ github.event.pull_request.number }}" ]; then
            if [ "${{ github.head_ref }}" = "release/next" ]; then
              gh pr comment ${{ github.event.pull_request.number }} --body-file eval-report.md \
                --edit-last --create-if-none
            else
              # Targeted PR runs post a fresh comment per run — measurements
              # are history worth keeping, and --edit-last could hijack the
              # skill-budget bot comment on PRs that touch skill files.
              gh pr comment ${{ github.event.pull_request.number }} --body-file eval-report.md
            fi
          fi
