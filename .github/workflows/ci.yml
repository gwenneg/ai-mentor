name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  catalog-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: tools/catalog-lint/go.mod
          cache: false
      - name: Self-test the Go tools (every audit check must fail the gate)
        run: |
          go -C tools/catalog-lint test ./...
          go -C tools/catalog-drift test ./...
          go -C tools/eval-runner test ./...
          go -C tools/approaches-index test ./...
          # The eval fixture is compilable Go whose first real compile must
          # never be B04's PostToolUse hook mid-eval-run.
          go -C evals/fixture test ./...
      - name: Catalog lint (deterministic, no LLM)
        run: go -C tools/catalog-lint run .
      - name: Capability index freshness (index.md is generated, never hand-edited)
        run: go -C tools/approaches-index run . -check

  plugin-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'
      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code
      - name: Validate plugin manifest and structure
        run: claude plugin validate .
