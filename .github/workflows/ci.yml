name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  structural-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: tools/structural-audit/go.mod
          cache: false
      - name: Self-test the Go tools (every audit check must fail the gate)
        run: |
          go -C tools/structural-audit test ./...
          go -C tools/catalog-drift test ./...
      - name: Structural audit (deterministic, no LLM)
        run: go -C tools/structural-audit run .

  plugin-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code
      - name: Validate plugin manifest and structure
        run: claude plugin validate .
